<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Literární aréna 1.1</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --ok: #0f9d58;
      --bad: #d93025;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px;
    }
    .app { width: 100%; max-width: 760px; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 16px;
    }
    h1, h2, p { margin-top: 0; }
    .title { text-align: center; font-size: 2rem; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 0; line-height: 1.5; }
    .menu-buttons, .actions { display: grid; gap: 12px; }
    .menu-buttons { grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); margin-top: 18px; }
    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    .primary { background: var(--accent); color: white; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: #e5e7eb; color: var(--text); }
    .question-box { font-size: 1.45rem; line-height: 1.55; font-weight: 700; margin-bottom: 18px; }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }
    #timerLabel {
      color: #b91c1c;
      background: #fee2e2;
      padding: 6px 10px;
      border-radius: 999px;
    }
    #timerLabel.timer-warning {
      animation: pulseTimer 0.8s infinite;
      color: #fff !important;
      box-shadow: 0 0 18px rgba(239,68,68,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    @keyframes pulseTimer {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    input[type="text"] {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid #d1d5db;
      font-size: 1.2rem;
      margin-bottom: 14px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }
    .feedback {
      min-height: 78px;
      border-radius: 14px;
      padding: 16px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.45;
      font-size: 1.15rem;
      margin-top: 8px;
    }
    .feedback.ok { display: flex; background: rgba(15,157,88,0.12); color: var(--ok); }
    .feedback.bad { display: flex; background: rgba(217,48,37,0.12); color: var(--bad); }
    .big-error { display: block; font-size: 1.6rem; margin-bottom: 8px; }
    #sectionLabel {
      color: #1d4ed8;
      background: #dbeafe;
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 800;
    }
    .hidden { display: none !important; }
    .result-mark { text-align: center; font-size: 3.5rem; font-weight: 900; margin: 8px 0 14px; }
    .result-text { text-align: center; font-size: 1.15rem; line-height: 1.6; margin-bottom: 18px; }
    .result-banner { text-align: center; font-size: 1.35rem; font-weight: 900; margin: 4px 0 12px; }
    .result-card-1 { background: linear-gradient(180deg, #fff7d6 0%, #ffffff 100%); }
    .result-card-2 { background: linear-gradient(180deg, #eaf7ff 0%, #ffffff 100%); }
    .result-card-3 { background: linear-gradient(180deg, #f4f4ff 0%, #ffffff 100%); }
    .result-card-4 { background: linear-gradient(180deg, #fff3e8 0%, #ffffff 100%); }
    .result-card-5 { background: linear-gradient(180deg, #ffeaea 0%, #ffffff 100%); }
    .section-list { margin: 10px 0 0; padding-left: 20px; line-height: 1.6; }

    
.home-card {
      overflow: hidden;
      position: relative;
      padding: 26px 22px 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.20), rgba(245, 158, 11, 0) 32%),
        linear-gradient(180deg, #0c1220 0%, #101827 52%, #1f2937 100%);
      color: #f9fafb;
      border: 1px solid rgba(251, 191, 36, 0.18);
      box-shadow: 0 20px 44px rgba(0,0,0,0.40);
    }
    .home-title {
      position: relative;
      text-align: center;
      font-size: 2.8rem;
      margin: 0 0 10px;
      color: #fff3c4;
      text-shadow: 0 0 24px rgba(251, 191, 36, 0.28), 0 3px 16px rgba(0,0,0,0.55);
      letter-spacing: 0.02em;
    }
    .home-subtitle {
      position: relative;
      text-align: center;
      color: #fff;
      font-weight: 800;
      font-size: 1.55rem;
      margin: 0 0 18px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .home-buttons {
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 14px;
      margin: 0 0 16px;
    }
    .home-buttons .primary {
      border-radius: 16px;
      padding: 18px 16px;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 22px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
      position: relative;
      overflow: hidden;
    }
    .home-buttons .primary:first-child {
      background: linear-gradient(180deg, #1f9d55 0%, #0d5f34 100%);
    }
    .home-buttons .primary:last-child {
      background: linear-gradient(180deg, #c63f28 0%, #7d1710 100%);
    }
    .home-buttons .primary::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
      pointer-events: none;
    }
    .hero-arena-wrap {
      position: relative;
      height: 300px;
      margin-top: 2px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(250, 204, 21, 0.22);
      box-shadow: inset 0 0 42px rgba(0,0,0,0.38), 0 12px 28px rgba(0,0,0,0.28);
      background-image:
        linear-gradient(180deg, rgba(4,8,18,0.20), rgba(4,8,18,0.40)),
        url("arena.jpg");
      background-size: cover;
      background-position: center;
    }
    .hero-arena-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 66%, rgba(255, 188, 71, 0.18), rgba(255,188,71,0) 22%),
        radial-gradient(circle at 9% 56%, rgba(255, 145, 35, 0.28), rgba(255,145,35,0) 10%),
        radial-gradient(circle at 91% 56%, rgba(255, 145, 35, 0.28), rgba(255,145,35,0) 10%),
        radial-gradient(circle at 44% 32%, rgba(255, 189, 92, 0.10), rgba(255,189,92,0) 18%),
        radial-gradient(circle at 56% 32%, rgba(255, 189, 92, 0.10), rgba(255,189,92,0) 18%);
      opacity: 0.92;
      animation: arenaFlicker 2.6s infinite ease-in-out;
      mix-blend-mode: screen;
      pointer-events: none;
    }
    .hero-arena-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 11% 54%, rgba(255,225,160,0.15), rgba(255,225,160,0) 4%),
        radial-gradient(circle at 89% 54%, rgba(255,225,160,0.15), rgba(255,225,160,0) 4%),
        radial-gradient(circle at 50% 68%, rgba(255,255,255,0.07), rgba(255,255,255,0) 22%);
      animation: arenaGlow 3.4s infinite ease-in-out;
      pointer-events: none;
    }
    .arena-embers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,180,80,0.95) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 10%, rgba(255,160,50,0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 47% 14%, rgba(255,180,80,0.85) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 62% 8%, rgba(255,160,50,0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 77% 16%, rgba(255,190,90,0.9) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 86% 11%, rgba(255,170,60,0.8) 0 1px, transparent 2px);
      opacity: 0.55;
      animation: emberFloat 5.5s infinite ease-in-out;
    }
    @keyframes arenaFlicker {
      0%, 100% { opacity: 0.78; transform: scale(1); }
      20% { opacity: 0.98; transform: scale(1.01); }
      45% { opacity: 0.72; transform: scale(0.997); }
      70% { opacity: 0.94; transform: scale(1.008); }
    }
    @keyframes arenaGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.95; }
    }
    @keyframes emberFloat {
      0%, 100% { transform: translateY(0px); opacity: 0.35; }
      50% { transform: translateY(-8px); opacity: 0.65; }
    }
    .hero-kicker, .home-note, .arena-sky-glow, .arena-statue, .arena-torch, .arena-wall, .arena-arches, .arena-arch, .arena-sand-line, .arena-floor {
      display: none !important;
    }
    .arena-floor::before {
      content: "";
      position: absolute;
      inset: 11px 26px;
      border-radius: 50%;
      border: 2px solid rgba(251, 191, 36, 0.24);
    }
    .arena-floor::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      width: 120px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(254,249,195,0.36) 0%, rgba(254,215,170,0.08) 46%, rgba(254,215,170,0) 100%);
      filter: blur(6px);
      animation: pulseGlow 3.6s ease-in-out infinite;
    }
    .arena-sand-line {
      position: absolute;
      left: 50%;
      bottom: 52px;
      width: 62%;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 50%;
      border-top: 2px solid rgba(245, 222, 179, 0.22);
      opacity: 0.55;
    }
    @keyframes pulseGlow {
      0%,100% { transform: translateX(-50%) scale(0.96); opacity: 0.75; }
      50% { transform: translateX(-50%) scale(1.06); opacity: 1; }
    }
    @keyframes torchFlicker {
      0% { transform: translateX(-50%) scale(0.96) translateY(0); opacity: 0.86; }
      100% { transform: translateX(-50%) scale(1.06) translateY(-2px); opacity: 1; }
    }

    .practice-select-card {
      overflow: hidden;
      position: relative;
      padding: 26px 22px 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.16), rgba(245, 158, 11, 0) 32%),
        linear-gradient(180deg, #0b101b 0%, #101827 55%, #1b2432 100%);
      color: #f9fafb;
      border: 1px solid rgba(251, 191, 36, 0.16);
      box-shadow: 0 20px 44px rgba(0,0,0,0.42);
    }
    .practice-select-title {
      position: relative;
      text-align: center;
      font-size: 2.1rem;
      margin: 0 0 8px;
      color: #fff3c4;
      text-shadow: 0 0 24px rgba(251, 191, 36, 0.22), 0 3px 16px rgba(0,0,0,0.55);
      letter-spacing: 0.02em;
    }
    .practice-select-subtitle {
      position: relative;
      text-align: center;
      color: #f8e7bc;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0 0 18px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .section-select-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .section-select-btn {
      position: relative;
      border-radius: 16px;
      padding: 18px 16px;
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #fff9e7;
      background:
        linear-gradient(180deg, rgba(120, 54, 23, 0.95), rgba(76, 30, 18, 0.96)),
        radial-gradient(circle at 50% 0%, rgba(255, 210, 126, 0.24), transparent 55%);
      border: 1px solid rgba(255, 210, 126, 0.18);
      box-shadow: 0 12px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .section-select-btn:hover {
      background:
        linear-gradient(180deg, rgba(145, 63, 25, 0.98), rgba(92, 33, 18, 0.98)),
        radial-gradient(circle at 50% 0%, rgba(255, 218, 145, 0.30), transparent 55%);
    }
    .section-select-actions {
      position: relative;
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    .section-select-actions .secondary {
      min-width: 220px;
      background: rgba(255,255,255,0.12);
      color: #f8e7bc;
      border: 1px solid rgba(255,255,255,0.10);
    }

    @media (max-width: 640px) {
      .card { padding: 18px; }
      .title { font-size: 1.7rem; }
      .question-box { font-size: 1.25rem; }
      .result-mark { font-size: 2.8rem; }
      input[type="text"] { font-size: 1.08rem; }
      .home-title { font-size: 2rem; }
      .home-subtitle { font-size: 1.14rem; }
      .home-buttons { grid-template-columns: 1fr; }
      .arena-statue.left { left: 28px; }
      .arena-statue.right { right: 28px; }
      .arena-torch.left { left: 64px; }
      .arena-torch.right { right: 64px; }
      .hero-arena-wrap { height: 228px; }
    }

    body {
      background:
        radial-gradient(circle at 50% 20%, rgba(255,210,120,0.10), rgba(7,10,18,0.92) 45%, rgba(4,6,12,0.98) 100%),
        linear-gradient(180deg, #0b1020 0%, #060811 100%);
      color: #f4ead5;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6,8,14,0.18), rgba(6,8,14,0.88)),
        url('arena.jpg') center/cover no-repeat;
      opacity: 0;
      transition: opacity 0.45s ease;
      pointer-events: none;
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 44%, rgba(255,160,55,0.16), transparent 18%),
        radial-gradient(circle at 82% 45%, rgba(255,160,55,0.16), transparent 18%),
        radial-gradient(circle at 50% 58%, rgba(255,214,140,0.09), transparent 24%);
      opacity: 0;
      animation: arenaFlicker 3.2s ease-in-out infinite;
      transition: opacity 0.45s ease;
      pointer-events: none;
      z-index: -1;
      mix-blend-mode: screen;
    }
    body.quiz-mode::before,
    body.quiz-mode::after,
    body.result-mode::before,
    body.result-mode::after {
      opacity: 1;
    }
    @keyframes arenaFlicker {
      0%, 100% { filter: brightness(0.9); }
      50% { filter: brightness(1.14); }
    }
    .app { max-width: 860px; }
    #screen-quiz.card {
      background:
        linear-gradient(180deg, rgba(32,23,18,0.88), rgba(17,13,11,0.94)),
        radial-gradient(circle at top, rgba(255,202,112,0.12), transparent 30%);
      border: 1px solid rgba(244, 207, 135, 0.18);
      box-shadow: 0 18px 55px rgba(0,0,0,0.38), inset 0 0 0 1px rgba(255,255,255,0.03);
      color: #f7edd7;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    #screen-quiz.card::before {
      content: "";
      position: absolute;
      inset: -10% -8% auto -8%;
      height: 210px;
      background: radial-gradient(circle at 50% 0%, rgba(255,224,152,0.24), transparent 62%);
      pointer-events: none;
    }
    #screen-quiz .meta {
      gap: 16px;
      margin-bottom: 28px;
      align-items: center;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function ensureAudioReady() {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function tone(freq, start, duration, type = 'sine', volume = 0.24) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(Math.max(volume * 0.45, 0.0001), start + Math.max(duration - 0.05, 0.02));
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.start(start);
      osc.stop(start + duration);
    }

    function chord(freqs, delay, duration, type = 'sine', volume = 0.18) {
      const start = audioCtx.currentTime + delay;
      freqs.forEach(freq => tone(freq, start, duration, type, volume));
    }

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[.,!?;:"'`()]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isWithinOneEdit(a, b) {
      if (a === b) return true;
      const lenA = a.length;
      const lenB = b.length;
      if (Math.abs(lenA - lenB) > 1) return false;
      let i = 0;
      let j = 0;
      let edits = 0;
      while (i < lenA && j < lenB) {
        if (a[i] === b[j]) {
          i++;
          j++;
          continue;
        }
        edits++;
        if (edits > 1) return false;
        if (lenA > lenB) i++;
        else if (lenB > lenA) j++;
        else {
          i++;
          j++;
        }
      }
      if (i < lenA || j < lenB) edits++;
      return edits <= 1;
    }

    function isAcceptedAnswer(userAnswer, answers) {
      if (!userAnswer) return false;
      return answers.some(answer => {
        const normalizedAnswer = normalizeText(answer);
        return userAnswer === normalizedAnswer || isWithinOneEdit(userAnswer, normalizedAnswer);
      });
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatAnswer(answer) {
      return answer.toUpperCase();
    }

    function buildSharpTest() {
      const result = [];
      for (const key of Object.keys(questionBank)) {
        const section = questionBank[key];
        const chosen = shuffle(section.questions).slice(0, section.sharpCount).map(q => ({ ...q, section: section.label }));
        result.push(...chosen);
      }
      return shuffle(result);
    }

    function buildPracticePool(sectionKey = null) {
      const all = [];
      if (sectionKey && questionBank[sectionKey]) {
        const section = questionBank[sectionKey];
        section.questions.forEach(q => all.push({ ...q, section: section.label, sectionKey }));
        return shuffle(all);
      }
      for (const key of Object.keys(questionBank)) {
        const section = questionBank[key];
        section.questions.forEach(q => all.push({ ...q, section: section.label, sectionKey: key }));
      }
      return shuffle(all);
    }

        { key: 'autor', label: 'Autoři' },
        { key: 'forma', label: 'Výrazové formy' },
        { key: 'druh', label: 'Literární druhy' },
        { key: 'zanr', label: 'Literární žánry' },
        { key: 'obdobi', label: 'Literární období' },
        { key: 'pojem', label: 'Pojmy' },
        { key: 'postava', label: 'Postavy' }
      ].filter(item => questionBank[item.key]);
    }

    function renderPracticeSectionButtons() {
      const grid = document.getElementById('practiceSectionGrid');
      if (!grid) return;
      grid.innerHTML = '';
      getPracticeSectionMenu().forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'section-select-btn';
        btn.textContent = item.label;
        btn.onclick = () => selectPracticeSection(item.key);
        grid.appendChild(btn);
      });
    }

    function updateSectionBreakdown() {
      const ul = document.getElementById('sectionBreakdown');
      ul.innerHTML = '';
      Object.values(questionBank).forEach(section => {
        const li = document.createElement('li');
        li.textContent = `${section.label}: ${section.sharpCount} otázky`;
        ul.appendChild(li);
      });
    }

    function showScreen(id) {
      document.getElementById('screen-home').classList.add('hidden');
      document.getElementById('screen-practice-sections').classList.add('hidden');
      document.getElementById('screen-info').classList.add('hidden');
      document.getElementById('screen-quiz').classList.add('hidden');
      document.getElementById('screen-result').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
      document.body.classList.remove('quiz-mode', 'result-mode');
      if (id === 'screen-quiz') document.body.classList.add('quiz-mode');
      if (id === 'screen-result') document.body.classList.add('result-mode');
    }

    function clearAutoAdvanceTimer() {
      if (autoAdvanceTimer) {
        clearTimeout(autoAdvanceTimer);
        autoAdvanceTimer = null;
      }
    }

    function clearQuestionTimer() {
      if (questionTimer) {
        clearInterval(questionTimer);
        questionTimer = null;
      }
      const timerLabel = document.getElementById('timerLabel');
      timerLabel.classList.add('hidden');
      timerLabel.classList.remove('timer-warning');
      timerLabel.textContent = 'Čas: 15 s';
    }

    function startQuestionTimer() {
      clearQuestionTimer();
      if (currentMode !== 'sharp') return;
      const timerLabel = document.getElementById('timerLabel');
      timeRemaining = 15;
      timerLabel.textContent = `Čas: ${timeRemaining} s`;
      timerLabel.classList.remove('hidden');
      questionTimer = setInterval(() => {
        if (answered) {
          clearQuestionTimer();
          return;
        }
        timeRemaining -= 1;
        timerLabel.textContent = `Čas: ${timeRemaining} s`;
        if (timeRemaining <= 5) {
          timerLabel.classList.add('timer-warning');
        }
        if (timeRemaining <= 0) {
          clearQuestionTimer();
          submitAnswer(true);
        }
      }, 1000);
    }

    function goHome() {
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      answered = false;
      currentPracticeSection = null;
      document.getElementById('answerInput').value = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').innerHTML = '';
      showScreen('screen-home');
    }


    let menuAudioCtx = null;
    function ensureMenuAudio() {
      if (!menuAudioCtx) {
        menuAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (menuAudioCtx.state === "suspended") {
        menuAudioCtx.resume();
      }
      return menuAudioCtx;
    }

    function playMetalClang(isStrong = false) {
      const ctx = ensureMenuAudio();
      const now = ctx.currentTime;

      const master = ctx.createGain();
      master.connect(ctx.destination);
      master.gain.setValueAtTime(isStrong ? 0.34 : 0.24, now);

      const freqs = isStrong
        ? [830, 1245, 1660, 2080]
        : [720, 1080, 1440, 1810];

      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = i % 2 === 0 ? "triangle" : "square";
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.82, now + 0.42);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime((isStrong ? 0.20 : 0.15) / (i + 1), now + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.46 + i * 0.03);
        osc.connect(gain);
        gain.connect(master);
        osc.start(now + i * 0.004);
        osc.stop(now + 0.5 + i * 0.03);
      });

      const thud = ctx.createOscillator();
      const thudGain = ctx.createGain();
      thud.type = "sine";
      thud.frequency.setValueAtTime(isStrong ? 120 : 105, now);
      thud.frequency.exponentialRampToValueAtTime(62, now + 0.16);
      thudGain.gain.setValueAtTime(0.0001, now);
      thudGain.gain.exponentialRampToValueAtTime(isStrong ? 0.22 : 0.14, now + 0.01);
      thudGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      thud.connect(thudGain);
      thudGain.connect(master);
      thud.start(now);
      thud.stop(now + 0.24);
    }

    function collectStudentIdentity() {
      const storedName = localStorage.getItem('literarniArenaStudentName') || currentStudentName || '';
      const storedClass = localStorage.getItem('literarniArenaStudentClass') || currentStudentClass || '';
      const enteredName = prompt('Zadej své jméno a příjmení:', storedName);
      if (enteredName === null) return false;
      const cleanName = enteredName.trim();
      if (!cleanName) {
        alert('Bez jména nemůže být výsledek zapsán do tabulky.');
        return false;
      }
      const enteredClass = prompt('Zadej svou třídu:', storedClass);
      if (enteredClass === null) return false;
      currentStudentName = cleanName;
      currentStudentClass = enteredClass.trim();
      localStorage.setItem('literarniArenaStudentName', currentStudentName);
      localStorage.setItem('literarniArenaStudentClass', currentStudentClass);
      return true;
    }

    function openResultsTable() {
      window.open(RESULTS_TABLE_URL, '_blank', 'noopener');
    }

    function setSaveStatus(message, isError = false) {
      const el = document.getElementById('saveStatus');
      if (!el) return;
      el.textContent = message || '';
      el.style.color = isError ? '#fecaca' : '#f7edd7';
    }

    async function sendSharpResult(mark, total) {
      if (!currentStudentName) return false;

      const payload = {
        jmeno: currentStudentName,
        trida: currentStudentClass,
        rezim: 'SOUBOJ',
        znamka: mark,
        body: correctCount,
        celkem: total,
        spravne: correctCount,
        spatne: wrongCount,
        poznamka: '',
        odeslano: new Date().toISOString()
      };

      return new Promise((resolve) => {
        try {
          const iframeName = 'hidden_result_frame_' + Date.now();

          const iframe = document.createElement('iframe');
          iframe.name = iframeName;
          iframe.style.display = 'none';
          document.body.appendChild(iframe);

          const form = document.createElement('form');
          form.method = 'POST';
          form.action = RESULTS_ENDPOINT;
          form.target = iframeName;
          form.style.display = 'none';

          Object.entries(payload).forEach(([key, value]) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value == null ? '' : String(value);
            form.appendChild(input);
          });

          document.body.appendChild(form);

          let done = false;

          const finish = (ok) => {
            if (done) return;
            done = true;
            setTimeout(() => {
              form.remove();
              iframe.remove();
            }, 1000);
            resolve(ok);
          };

          iframe.onload = () => finish(true);

          form.submit();

          setTimeout(() => finish(true), 1500);
        } catch (err) {
          console.error('Chyba při odesílání výsledku:', err);
          resolve(false);
        }
      });
    }

    function handlePracticeStart() {
      playMetalClang(false);
      setTimeout(() => openPracticeSections(), 120);
    }

    function handleSharpStart() {
      if (!collectStudentIdentity()) return;
      playMetalClang(true);
      setTimeout(() => startSharp(), 140);
    }

    function openPracticeSections() {
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      answered = false;
      renderPracticeSectionButtons();
      showScreen('screen-practice-sections');
    }

    function selectPracticeSection(sectionKey) {
      playArenaSound('practice');
      startPractice(sectionKey);
    }

    function startPractice(sectionKey) {
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      currentMode = 'practice';
      currentPracticeSection = sectionKey;
      currentQuestions = buildPracticePool(sectionKey);
      currentIndex = 0;
      correctCount = 0;
      wrongCount = 0;
      answered = false;
      showScreen('screen-quiz');
      renderQuestion();
    }

    function startSharp() {
      playArenaSound('sharp');
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      currentMode = 'sharp';
      currentQuestions = buildSharpTest();
      currentIndex = 0;
      correctCount = 0;
      wrongCount = 0;
      answered = false;
      showScreen('screen-quiz');
      renderQuestion();
    }

    function renderQuestion() {
      clearAutoAdvanceTimer();
      if (currentMode === 'practice' && currentIndex >= currentQuestions.length) {
        currentQuestions = buildPracticePool(currentPracticeSection);
        currentIndex = 0;
      }
      const q = currentQuestions[currentIndex];
      document.getElementById('modeLabel').textContent = currentMode === 'sharp' ? 'Režim: TEST' : 'Režim: TRÉNINK';
      document.getElementById('progressLabel').textContent = `Otázka ${currentIndex + 1} / ${currentQuestions.length}`;
      let labelText = '';
      switch(q.section) {
        case 'Název literárního díla': labelText = 'Doplň název literárního díla'; break;
        case 'Autor': labelText = 'Doplň správného autora'; break;
        case 'Výrazová forma': labelText = 'Doplň správnou literární formu'; break;
        case 'Literární druh': labelText = 'Doplň správný literární druh'; break;
        case 'Literární žánr': labelText = 'Doplň správný literární žánr'; break;
        case 'Literární pojem': labelText = 'Doplň správný literární pojem'; break;
        case 'Literární období': labelText = 'Doplň správné literární období'; break;
        case 'Literární postava': labelText = 'Doplň správnou literární postavu'; break;
        default: labelText = `Doplň správně: ${q.section}`;
      }
      document.getElementById('sectionLabel').textContent = labelText;
      document.getElementById('questionText').textContent = q.prompt;
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').disabled = false;
      document.getElementById('answerInput').focus();
      document.getElementById('submitBtn').classList.remove('hidden');
      document.getElementById('nextBtn').classList.add('hidden');
      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.innerHTML = '';
      const stats = document.getElementById('practiceStats');
      if (currentMode === 'practice') {
        stats.classList.remove('hidden');
        stats.textContent = `Správně: ${correctCount} | Špatně: ${wrongCount}`;
      } else {
        stats.classList.add('hidden');
      }
      answered = false;
      startQuestionTimer();
    }

    function submitAnswer(isTimeout = false) {
      if (answered) return;
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      const q = currentQuestions[currentIndex];
      const userAnswer = normalizeText(document.getElementById('answerInput').value);
      const good = isAcceptedAnswer(userAnswer, q.answers);
      const feedback = document.getElementById('feedback');
      answered = true;
      document.getElementById('answerInput').disabled = true;
      document.getElementById('submitBtn').classList.add('hidden');
      if (good) {
        correctCount++;
        document.getElementById('nextBtn').classList.add('hidden');
        feedback.className = 'feedback ok';
        feedback.innerHTML = '<span><span class="feedback-main">✅ SPRÁVNĚ</span></span>';
        playSuccessSound();
        autoAdvanceTimer = setTimeout(() => {
          autoAdvanceTimer = null;
          nextQuestion();
        }, 1000);
      } else {
        wrongCount++;
        const mainAnswer = formatAnswer(q.answers[0]);
        document.getElementById('nextBtn').classList.remove('hidden');
        feedback.className = 'feedback bad';
        feedback.innerHTML = `<span><span class="big-error">${isTimeout ? '⏰ VYPRŠEL ČAS' : '❌ CHYBA'}</span>SPRÁVNÁ ODPOVĚĎ: ${mainAnswer}</span>`;
        playErrorSound();
      }
      if (currentMode === 'practice') {
        document.getElementById('practiceStats').textContent = `Správně: ${correctCount} | Špatně: ${wrongCount}`;
      }
    }

    function nextQuestion() {
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      currentIndex++;
      if (currentMode === 'sharp' && currentIndex >= currentQuestions.length) {
        showResults();
        return;
      }
      renderQuestion();
    }

    function calculateMark(score) {
      if (score >= 14) return 1;
      if (score >= 12) return 2;
      if (score >= 9) return 3;
      if (score >= 7) return 4;
      return 5;
    }

    async function showResults() {
      clearAutoAdvanceTimer();
      clearQuestionTimer();
      const total = currentQuestions.length;
      const mark = calculateMark(correctCount);
      document.getElementById('resultMark').textContent = mark;
      document.getElementById('screen-result').className = `card result-card-${mark}`;
      document.getElementById('resultBanner').textContent = mark === 1 ? '🔥 MÁŠ JEDNIČKU!' : mark === 2 ? '👏 VELMI PĚKNÝ VÝSLEDEK' : mark === 3 ? '🙂 TOHLE JE JEŠTĚ DOBRÉ' : mark === 4 ? '⚠️ TĚSNĚ TO VYŠLO' : '📘 TO CHCE JEŠTĚ PROCVIČIT';
      document.getElementById('resultText').innerHTML = `
        Body: <strong>${correctCount}</strong> z <strong>${total}</strong>.<br>
        Slovní hodnocení: <strong>${mark === 1 ? 'výborně' : mark === 2 ? 'chvalitebně' : mark === 3 ? 'dobře' : mark === 4 ? 'dostatečně' : 'nedostatečně'}</strong><br>
        Výsledná známka: <strong>${mark}</strong>
      `;
      setSaveStatus('Odesílám výsledek do tabulky...');
      playGradeSound(mark);
      showScreen('screen-result');
      const saved = await sendSharpResult(mark, total);
      setSaveStatus(
        saved
          ? 'Výsledek byl odeslán do tabulky.'
          : 'Výsledek se nepodařilo odeslat do tabulky.',
        !saved
      );
    }

    document.getElementById('answerInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (!answered) {
          submitAnswer();
        } else if (!autoAdvanceTimer) {
          nextQuestion();
        }
      }
    });

    updateSectionBreakdown();
    renderPracticeSectionButtons();
  </script>
</body>
